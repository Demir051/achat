# Neon (PostgreSQL) + Render (backend + frontend)
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: achat-api
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    releaseCommand: npx prisma db push
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        sync: false

staticSites:
  - name: achat-web
    rootDir: client
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
